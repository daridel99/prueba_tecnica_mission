services:

  backend:
    build: ./backend
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py seed_data &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
