services:
  - type: web
    name: datapulse-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "True"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: https://datapulse-latam.onrender.com,http://localhost:4200
      - key: PYTHON_VERSION
        value: "3.11.11"

  - type: web
    name: datapulse-latam
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npx ng build --configuration=production
    staticPublishPath: dist/frontend/browser
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
